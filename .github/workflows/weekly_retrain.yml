name: Weekly Ensemble Retraining

on:
  schedule:
    # Runs at 3:40 AM UTC (9:10 AM IST) every Monday (Day 1)
    - cron: '40 3 * * 1'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Core Training Engine
      run: |
        python scripts/main.py

    - name: Commit and Push Updated Model & Artifacts
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add crash_predictor.pkl data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Retraining: Fresh Ensemble & Data Sync" && git push)