name: Live Market & Sentiment Sync

on:
  schedule:
    # 1. Runs at 3:43 AM UTC (9:13 AM IST - Market Open pre-check)
    - cron: '43 3 * * 1-5'
    
    # 2. Runs at 5:17 AM UTC (10:47 AM IST - Morning session update)
    - cron: '17 5 * * 1-5'
    
    # 3. Runs at 6:47 AM UTC (12:17 PM IST - Mid-day sentiment)
    - cron: '47 6 * * 1-5'
    
    # 4. Runs at 8:17 AM UTC (1:47 PM IST - Post-European open)
    - cron: '17 8 * * 1-5'
    
    # 5. Runs at 9:47 AM UTC (3:17 PM IST - Pre-close assessment)
    - cron: '47 9 * * 1-5'
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI whenever you want

permissions:
  contents: write

jobs:
  update-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Boot up the virtual environment and clone your repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Install Python on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Install your quantitative architecture's dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

      # 4. Run the scraper, THEN run the inference engine
    - name: Run Daily Live Inference
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python scripts/news_scraper.py
        python scripts/daily_inference.py

    # 5. Commit and push the updated SQLite database back to the repository
    - name: Commit and Push Database Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add \
        data/financial_news.db \
        data/final_predictions.csv \
        data/macro_stress_signals.csv \
        data/live_risk_history.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Market Update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" && git push)
